<script>
    //账单日期 ≤ 2025-07-18 时，就会自动用 0.6，之后就会用 0.617
    function getUnitPrice(dateStr) {
        const cutoff = new Date('2025-07-18');
        const billDate = new Date(dateStr);
        return billDate <= cutoff ? 0.6 : 0.617;
    }

    // 渲染电费表格
    function renderElectricityTable() {
        const container = document.getElementById('electricityTable');
        container.innerHTML = '';

        billingPeriods.forEach((currentPeriod, idx) => {
            const unitPrice = getUnitPrice(currentPeriod.billingPeriodDate);

            // 跳过最后一期，因为无法再为它解析[上期数据]
            if (idx === billingPeriods.length - 1) {
                return;
            }
            // 构建上期读数映射，数据结构：{1号表: 5337.5, 2号表: 7995.4, 3号表: 10008.2, 4号表: 7904.9}
            const previousPeriod = billingPeriods[idx + 1];
            const previousReadingMap = {};
            previousPeriod.meters.forEach(m => {
                previousReadingMap[m.meterId] = m.currentReading;
            });
            // 一次遍历，计算所有汇总指标
            const {
                totalPeopleCount,
                totalMeterPaid,
                totalEnergyUsed
            } = currentPeriod.meters.reduce((accumulator, {meterId, currentReading, peopleCount}) => {
                const prev = previousReadingMap[meterId];
                const energy = currentReading - prev;
                accumulator.totalPeopleCount += peopleCount;
                accumulator.totalMeterPaid += energy * unitPrice;
                accumulator.totalEnergyUsed += energy;
                return accumulator;
            }, {
                totalPeopleCount: 0,
                totalMeterPaid: 0,
                totalEnergyUsed: 0
            });
            // 计算[待公摊]
            const totalBillingPaid = currentPeriod.totalBillingPaid;
            const totalPublicPaid = totalBillingPaid - totalMeterPaid;
            const isNegativePublicPaid = totalPublicPaid < 0 && false; //公摊费是否<0
            console.log(
                '1：billingPeriodDate=', currentPeriod.billingPeriodDate,
                'totalBillingPaid=', totalBillingPaid,
                'meters=', currentPeriod.meters,
                'totalPeopleCount=', totalPeopleCount,
                'totalMeterPaid=', totalMeterPaid.toFixed(2),
                'totalPublicPaid=', totalPublicPaid.toFixed(3),
                'totalEnergyUsed=', totalEnergyUsed.toFixed(1),
                'previousReadingMap=', previousReadingMap,
            );

            //渲染表格
            const block = document.createElement('div');
            block.classList.add('period-block', 'mb-4', 'result-table');
            if (idx % 2 === 0) block.classList.add('odd-period');

            //标题和照片的首行
            const title = document.createElement('h1');
            title.textContent = `帐单日期：${currentPeriod.billingPeriodDate} 电费总额￥：${totalBillingPaid.toFixed(2)}`;
            // 缩略图（点击打开 Modal）
            const thumb = document.createElement('img');
            // 如果没有配置图片或地址为空，则使用默认图片
            const imgUrl = "data/image/" + currentPeriod.billingPeriodDate + ".jpg";
            thumb.src = imgUrl;
            // 如果加载失败（路径错了、文件不存在等），也回退到默认图
            thumb.onerror = () => {
                thumb.src = 'data/image/nopicture.jpg';
            };
            thumb.width = 100;
            thumb.height = 100;
            thumb.style.cursor = 'pointer';
            thumb.style.marginLeft = '15px';
            thumb.style.marginTop = '1px';
            thumb.alt = 'Meter Photo';
            thumb.addEventListener('click', () => {
                const modalImg = document.getElementById('modalImage');
                modalImg.src = imgUrl;  // 弹窗也可以同样使用 imgUrl
                modalImg.onerror = () => {
                    modalImg.src = 'data/image/nopicture.jpg';
                };
                const modal = new bootstrap.Modal(document.getElementById('photoModal'));
                modal.show();
            });
            title.appendChild(thumb);
            //
            block.appendChild(title);

            const table = document.createElement('table');
            table.classList.add('table', 'table-bordered', 'table-hover');
            let theadHTML = `
            <thead class="thead-dark">
              <tr>
                <th>电表</th>
                <th>上期读数</th>
                <th>本期读数</th>
                <th>度数kWh<br><span class="th-info">本期读数-上期读数</span></th>
                <th>电表费￥<br><span class="th-info">度数×<a href="https://m.sh.bendibao.com/news/265282.html" target="_blank">${unitPrice}</a></span></th>
                <th>待公摊￥<br><span class="th-info">电费总额-总电表费</span></th>
                <th>公摊费￥<br><span class="th-info">待公摊×<sup>人数</sup>&frasl;<sub>总人数</sub></span></th>
                <th>总费用￥<br><span class="th-info">电表费+公摊费</span></th>
            `;
            if (isNegativePublicPaid) {
                theadHTML += `
                <th>总费用￥<br><span class="th-info">按用电比，公摊费<0时使用</span><br>
                    <span class="th-info">电费总额×<sup>度数</sup>&frasl;<sub>总度数</sub></span>
                </th>
            `;
            }
            theadHTML += `</tr></thead><tbody></tbody>`;
            table.innerHTML = theadHTML;
            const tbody = table.querySelector('tbody');
            let totalCombinePaid = 0;
            let totalRatioPaid = 0;
            currentPeriod.meters.forEach((meter, rowIndex) => {
                const meterId = meter.meterId;
                const peopleCount = meter.peopleCount;
                const currentReading = meter.currentReading;//本期读数
                const previousReading = previousReadingMap[meterId];//上期读数
                const energyUsed = currentReading - previousReading;//使用度数
                const meterPaid = energyUsed * unitPrice;//电表费
                const sharedPaid = totalPublicPaid * peopleCount / totalPeopleCount;//公摊费
                const combinePaid = sharedPaid + meterPaid;//按：电表费+公摊费
                totalCombinePaid += combinePaid;
                const ratioPaid = (energyUsed / totalEnergyUsed) * totalBillingPaid;//按：度数/总度数×电费总额
                totalRatioPaid += ratioPaid
                console.log(
                    '2:meterId==', meterId,
                    'peopleCount==', peopleCount,
                    'currentReading==', currentReading,
                    'previousReading==', previousReading,
                    'energyUsed==', energyUsed,
                    'meterPaid==', meterPaid.toFixed(3),
                    'sharedPaid==', sharedPaid.toFixed(3),
                    'combinePaid==', combinePaid.toFixed(2),
                    'ratioPaid==', ratioPaid.toFixed(2),
                    'totalBillingPaid==', totalBillingPaid,
                    'totalPublicPaid==', totalPublicPaid.toFixed(3),
                    'totalPeopleCount==', totalPeopleCount
                );
                const alias = meterAliasMap[meterId]
                let rowHTML = `
                    <tr>
                        <td><span>${meterId}</span><br><span class="th-info alias-emphasis">${alias}</span><br><span class="th-info">人数: ${peopleCount > 1 ? `<span class="people-count-emphasis">${peopleCount}</span>` : peopleCount}</span></td>
                        <td><span class="td-value">${previousReadingMap[meterId]}</span></td>
                        <td><span class="td-value">${currentReading}</span></td>
                        <td><span class="td-value">${energyUsed.toFixed(1)}</span><br><span class="th-info">${currentReading}-${previousReading}</span></td>
                        <td class="meter-paid"><span class="td-value">${meterPaid.toFixed(3)}</span><br><span class="th-info">${energyUsed.toFixed(1)}×${unitPrice}</span></td>
                `;
                // 只在第一行输出待公摊这一列，并合并纵跨 4 行
                if (rowIndex === 0) {
                    rowHTML += `
                        <td rowspan="4" style="vertical-align: middle; text-align: center;">
                            <span class="td-value">${totalPublicPaid.toFixed(3)}</span><br><span class="th-info">${totalBillingPaid.toFixed(2)}-${totalMeterPaid.toFixed(3)}</span>
                        </td>
                    `;
                }
                rowHTML += `
                        <td class="shared-paid"><span class="td-value">${sharedPaid.toFixed(3)}</span><br><span class="th-info">${totalPublicPaid.toFixed(3)}×<sup>${peopleCount > 1 ? `<span class="people-count-emphasis">${peopleCount}</span>` : peopleCount}</sup>&frasl;<sub>${totalPeopleCount}</sub></span></td>
                        <td class="combine-paid"><span class="td-value">${combinePaid.toFixed(2)}</span><br><span class="th-info">${meterPaid.toFixed(3)}+${sharedPaid > 0 ? sharedPaid.toFixed(3) : `(${sharedPaid.toFixed(3)})`}</span></td>
                `;
                if (isNegativePublicPaid) {
                    rowHTML += `
                        <td class="ratio-paid"><span class="td-value">${ratioPaid.toFixed(2)}</span><br><span class="th-info">${totalBillingPaid}×<sup>${energyUsed.toFixed(1)}</sup>&frasl;<sub>${totalEnergyUsed.toFixed(2)}</sub></span></td>
                    `;
                }
                rowHTML += `</tr>`;
                tbody.insertAdjacentHTML('beforeend', rowHTML);
            });
            let totalRowHTML = `
                <tr>
                    <td>总<span class="th-info"><br>人数: ${totalPeopleCount}</span></td>
                    <td></td>
                    <td></td>
                    <td><span class="td-value">${totalEnergyUsed.toFixed(1)}</span></td>
                    <td><span class="td-value">${totalMeterPaid.toFixed(3)}</span></td>
                    <td></td>
                    <td></td>
                    <td><span class="td-value">${totalCombinePaid.toFixed(2)}</span>${Math.abs(totalCombinePaid - totalBillingPaid) === 0 ? "✔" : "✖"}</td>

            `;
            if (isNegativePublicPaid) {
                totalRowHTML += `
                <td>${totalRatioPaid.toFixed(2)}</td>
                `;
            }
            totalRowHTML += `</tr>`;
            tbody.insertAdjacentHTML('beforeend', totalRowHTML);
            block.appendChild(table);
            // —— 仅在 isNegativePublicPaid 时才显示提示 ——
            if (isNegativePublicPaid) {
                const noteWrapper = document.createElement('div');
                noteWrapper.className = 'alert alert-info border-0 rounded-0 mt-2';
                noteWrapper.innerHTML = `
                <div class="d-flex align-items-center">
                  <span class="me-2">📌</span>
                  <div>
                    本期由于公摊费<0，<span class="ratio-info">按用电比</span>付费
                  </div>
                </div>
              `;
                block.appendChild(noteWrapper);
            }
            container.appendChild(block);
        });
    }

    window.onload = renderElectricityTable;
</script>

<script>
    let energyChartInstance = null;

    // 自定义插件：按“同一天的一组柱子”聚合，只在组中心画一次日期
    const dateLabelsPlugin = {
        id: 'dateLabelsPlugin',
        afterDatasetsDraw(chart, args, pluginOpts) {
            const {ctx, scales} = chart;
            const yUsage = scales.yUsage;
            if (!yUsage) return;

            // 收集所有 bar 元素，按 dateLabel 分组
            const groups = new Map(); // key: dateLabel, value: {xs: [像素x...]}
            chart.data.datasets.forEach((ds, dsi) => {
                if (ds.type !== 'bar') return;
                const meta = chart.getDatasetMeta(dsi);
                meta.data.forEach((elem, idx) => {
                    const pt = ds.data[idx];
                    if (!pt || pt.y == null) return;         // 只对真正有柱子的点画标签
                    const label = pt.dateLabel;
                    if (!label) return;
                    if (!groups.has(label)) groups.set(label, {xs: []});
                    groups.get(label).xs.push(elem.x);
                });
            });

            if (groups.size === 0) return;

            ctx.save();
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            const baselineY = yUsage.bottom + 4; // 基线位置
            groups.forEach(({xs}, label) => {
                // 组中心（可选：也可用平均值）
                const centerX = xs.reduce((a, b) => a + b, 0) / xs.length;
                ctx.fillText(label, centerX, baselineY);
            });

            ctx.restore();
        }
    };

    function renderEnergyChart() {
        // 仅保留最近periodCount期（index 0 是最新）
        const periodCount = 6;
        const lastCount = Math.min(periodCount, billingPeriods.length);
        const recentDesc = billingPeriods.slice(0, lastCount); // newest -> older
        const ascPeriods = recentDesc.slice().reverse();       // oldest(倒数第periodCount) -> newest

        const meterIds = ascPeriods[0].meters.map(m => m.meterId);

        // X 轴范围：线性时间轴（距 xStart 的天数）
        const DAY_MS = 24 * 60 * 60 * 1000;
        const startRef = new Date(ascPeriods[0].billingPeriodDate);
        const endRef = new Date(recentDesc[0].billingPeriodDate);
        const xStart = startRef;
        const xEnd = endRef;
        const xMin = 0;
        const xMax = Math.ceil((xEnd - xStart) / DAY_MS);

        const dateToDays = (dateStr) => (new Date(dateStr) - xStart) / DAY_MS;

        // 数据容器
        const readingPointsMap = {};
        const usagePointsMap = {};
        meterIds.forEach(id => {
            readingPointsMap[id] = [];
            usagePointsMap[id] = [];
        });

        // 若要给“倒数第periodCount期”也计算用电量，需要窗口外上一期（更早一期）
        const prevForFirst = billingPeriods.length > lastCount ? billingPeriods[lastCount] : null;
        let prevFirstMap = null;
        if (prevForFirst) {
            prevFirstMap = {};
            prevForFirst.meters.forEach(m => (prevFirstMap[m.meterId] = m.currentReading));
        }

        // 构造折线(累计读数) & 柱(ΔkWh)
        for (let i = 0; i < ascPeriods.length; i++) {
            const period = ascPeriods[i];
            const xDays = dateToDays(period.billingPeriodDate);

            const currMap = {};
            period.meters.forEach(m => (currMap[m.meterId] = m.currentReading));

            // 折线：累计读数
            period.meters.forEach(m => {
                readingPointsMap[m.meterId].push({
                    x: xDays,
                    y: +m.currentReading.toFixed(1)
                });
            });

            // ΔkWh：i==0 用窗口外上一期（若有）；i>0 用 ascPeriods[i-1]
            if (i === 0) {
                if (prevFirstMap) {
                    meterIds.forEach(id => {
                        const used = currMap[id] - prevFirstMap[id];
                        usagePointsMap[id].push({
                            x: xDays,
                            y: +used.toFixed(1),
                            dateLabel: period.billingPeriodDate   // 账单日期用于画标签
                        });
                    });
                } // 没有外部上一期时，不生成柱子，也就不画该期日期
            } else {
                const prev = ascPeriods[i - 1];
                const prevMap = {};
                prev.meters.forEach(m => (prevMap[m.meterId] = m.currentReading));
                meterIds.forEach(id => {
                    const used = currMap[id] - prevMap[id];
                    usagePointsMap[id].push({
                        x: xDays,
                        y: +used.toFixed(1),
                        dateLabel: period.billingPeriodDate
                    });
                });
            }
        }

        // 颜色
        const lineColors = ['rgb(255,99,132)', 'rgb(54,162,235)', 'rgb(75,192,192)', 'rgb(255,159,64)'];
        const barFills = ['rgba(255,99,132,0.25)', 'rgba(54,162,235,0.25)', 'rgba(75,192,192,0.25)', 'rgba(255,159,64,0.25)'];
        const barBorders = ['rgba(255,99,132,0.9)', 'rgba(54,162,235,0.9)', 'rgba(75,192,192,0.9)', 'rgba(255,159,64,0.9)'];

        // 组装 datasets
        const datasets = [];
        meterIds.forEach((id, i) => {
            // 折线
            datasets.push({
                label: `${id}（读数）`,
                type: 'line',
                yAxisID: 'yReading',
                data: readingPointsMap[id],
                fill: false,
                tension: 0.35,
                pointRadius: 3,
                borderWidth: 2,
                borderColor: lineColors[i],
                backgroundColor: lineColors[i],
                parsing: false,
            });
            // 柱
            datasets.push({
                label: `${id}（用电量）`,
                type: 'bar',
                yAxisID: 'yUsage',
                data: usagePointsMap[id],
                borderWidth: 1,
                borderColor: barBorders[i],
                backgroundColor: barFills[i],
                parsing: false,
                barPercentage: 0.9,
                categoryPercentage: 0.9
            });
        });

        if (energyChartInstance) energyChartInstance.destroy();

        const ctx = document.getElementById('energyChart').getContext('2d');
        energyChartInstance = new Chart(ctx, {
            data: {datasets},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                parsing: false,
                interaction: {mode: 'nearest', intersect: false},
                layout: {padding: {bottom: 22}}, // 给日期标签留空间
                scales: {
                    x: {
                        type: 'linear',
                        min: xMin,
                        max: xMax,
                        // 隐藏原有 X 轴刻度与文字
                        ticks: {display: false},
                        grid: {drawOnChartArea: true, drawTicks: false}
                    },
                    yUsage: {
                        position: 'right',
                        beginAtZero: true,
                        title: {display: true, text: '用电量kWh'},
                        grid: {drawOnChartArea: true}
                    },
                    yReading: {
                        position: 'left',
                        title: {display: true, text: '电表读数'},
                        grid: {drawOnChartArea: false}
                    }
                },
                plugins: {
                    title: {display: true, text: '近' + periodCount + '期用电变化'},
                    legend: {position: 'top'},
                    tooltip: {
                        callbacks: {
                            // 提示框仍用日期，便于查看
                            title: (items) => {
                                const ds = items[0].dataset;
                                const i = items[0].dataIndex;
                                const d = ds.data?.[i]?.dateLabel;
                                if (d) return d;
                                // 折线点没有 dateLabel，用线性刻度反推
                                const DAY_MS = 24 * 60 * 60 * 1000;
                                const xStart = new Date(ascPeriods[0].billingPeriodDate);
                                const d2 = new Date(xStart.getTime() + Math.round(items[0].parsed.x) * DAY_MS);
                                const yyyy = d2.getFullYear();
                                const mm = String(d2.getMonth() + 1).padStart(2, '0');
                                const dd = String(d2.getDate()).padStart(2, '0');
                                return `${yyyy}-${mm}-${dd}`;
                            },
                            label: (item) => {
                                const name = item.dataset.label || '';
                                const y = item.parsed.y;
                                return item.dataset.yAxisID === 'yUsage' ? `${name}: ${y} kWh` : `${name}: ${y}`;
                            }
                        }
                    }
                }
            },
            plugins: [dateLabelsPlugin]
        });
    }
</script>
<script>
    function prefillAddForm() {
        const form = document.getElementById('addPeriodForm');
        if (!form || !billingPeriods || billingPeriods.length === 0) return;

        const setBoth = (input, val) => {
            input.value = val;
            input.defaultValue = val; // 关键：更新默认值，避免 reset 回到写死值
        };

        const last = billingPeriods[0];
        const DAY_MS = 24 * 60 * 60 * 1000;

        const lastDate = new Date(last.billingPeriodDate);
        const nextDate = new Date(lastDate.getTime() + 40 * DAY_MS);
        const yyyy = nextDate.getFullYear();
        const mm = String(nextDate.getMonth() + 1).padStart(2, '0');
        const dd = String(nextDate.getDate()).padStart(2, '0');
        setBoth(form.billingDate, `${yyyy}-${mm}-${dd}`);

        // 你也可以选择把“电费总额”同步更新为上期或清空，这里示例：保留当前值不动
        // setBoth(form.totalPaid, form.totalPaid.value);

        const lastMap = {};
        (last.meters || []).forEach(m => lastMap[m.meterId] = m);

        const inc = () => 200 + Math.random() * 80;
        const addDelta = (base) => +(base + inc()).toFixed(1);

        if (lastMap['1号表']) {
            setBoth(form.m1Reading, addDelta(parseFloat(lastMap['1号表'].currentReading)));
            setBoth(form.m1Count, (lastMap['1号表'].peopleCount ?? 1).toString());
        }
        if (lastMap['2号表']) {
            setBoth(form.m2Reading, addDelta(parseFloat(lastMap['2号表'].currentReading)));
            setBoth(form.m2Count, (lastMap['2号表'].peopleCount ?? 1).toString());
        }
        if (lastMap['3号表']) {
            setBoth(form.m3Reading, addDelta(parseFloat(lastMap['3号表'].currentReading)));
            setBoth(form.m3Count, (lastMap['3号表'].peopleCount ?? 1).toString());
        }
        if (lastMap['4号表']) {
            setBoth(form.m4Reading, addDelta(parseFloat(lastMap['4号表'].currentReading)));
            setBoth(form.m4Count, (lastMap['4号表'].peopleCount ?? 1).toString());
        }
    }
</script>

<script>
    // 给表单绑定 submit 事件
    document.getElementById('addPeriodForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const form = e.target;

        // 取值
        const billingDate = form.billingDate.value; // YYYY-MM-DD
        const totalPaid = parseFloat(form.totalPaid.value);

        // 四个电表数据
        const newMeters = [];
        for (let i = 1; i <= 4; i++) {
            const reading = parseFloat(form[`m${i}Reading`].value);
            const count = parseInt(form[`m${i}Count`].value, 10);
            newMeters.push({
                meterId: `${i}号表`,
                currentReading: reading,
                peopleCount: count
            });
        }

        // 构造新账单对象
        const newPeriod = {
            billingPeriodDate: billingDate,
            totalBillingPaid: totalPaid,
            meters: newMeters
        };

        // 插入最前面，作为最新一期
        billingPeriods.unshift(newPeriod);

        // 重新渲染表格和图表
        renderElectricityTable();
        renderEnergyChart();

        // 清空表单
        form.reset();
        prefillAddForm();
    });
    document.getElementById('downloadDataBtn').addEventListener('click', function () {
        // 1. 序列化当前的 billingPeriods
        const jsonStr = JSON.stringify(billingPeriods, null, 2);
        // 2. 生成一个 Blob
        const blob = new Blob([jsonStr], {type: 'application/json'});
        // 3. 创建一个临时下载链接
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'billingPeriods.json'; // 下载文件名
        // 4. 触发点击
        a.click();
        // 5. 清理
        URL.revokeObjectURL(url);
    });
    // 页面加载时渲染
    window.onload = function () {
        renderElectricityTable();
        renderEnergyChart();
        prefillAddForm();
    };
</script>
